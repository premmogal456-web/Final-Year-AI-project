<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f2027;
            color: white;
        }

        .navbar {
            background: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: #00ffff;
            margin: 0;
        }

        .navbar a {
            color: #00ffff;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            padding: 40px;
        }

        .card {
            background: #1a1a1a;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 5px solid #00ffff;
            border-radius: 5px;
        }

        img {
            max-width: 600px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h2>📊 Reports & Analytics</h2>
    <div>
        <a href="/">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h3>Total Attacks Recorded</h3>
        <h2>{{ total_attacks }}</h2>
    </div>

    <div class="card">
        <h3>Attack Distribution Chart</h3>
        <img src="{{ url_for('static', filename='attack_chart.png') }}">
    </div>

</div>

</body>
</html>
